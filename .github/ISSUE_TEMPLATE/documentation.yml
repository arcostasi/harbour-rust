name: "Documentation / Documentação"
description: "Report a docs issue or propose a documentation improvement."
title: "[Docs]: "
labels:
  - documentation
body:
  - type: textarea
    id: location
    attributes:
      label: Document or location / Documento ou local
      description: Which file or section needs attention?
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: Issue / Problema
      description: What is unclear, missing, outdated, or inconsistent?
    validations:
      required: true
  - type: dropdown
    id: language
    attributes:
      label: Language scope / Escopo de idioma
      options:
        - English only
        - Portuguese only
        - Both English and Portuguese
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement / Sugestão de melhoria
