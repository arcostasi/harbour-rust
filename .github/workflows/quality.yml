name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Run workspace tests
        run: cargo test --workspace

      - name: Check fuzz harness
        run: cargo check --manifest-path fuzz/Cargo.toml

      - name: Run benchmark smoke
        run: cargo run -p harbour-rust-tests --bin benchmark-suite -- --fixture examples/hello.prg --iterations 1 > benchmark-smoke.md

      - name: Upload benchmark smoke report
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-smoke
          path: benchmark-smoke.md
