name: release

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to publish. Leave empty to run only the build flow for the current ref.
        required: false
        type: string

permissions:
  contents: write

jobs:
  preflight:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run fmt
        run: cargo fmt --all --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --workspace

      - name: Check fuzz harness
        run: cargo check --manifest-path fuzz/Cargo.toml

      - name: Generate benchmark report
        run: cargo run -p harbour-rust-tests --bin benchmark-suite -- --fixture examples/hello.prg --fixture tests/fixtures/parser/phase7_acceptance.prg --iterations 1 > benchmark-report.md

      - name: Upload benchmark report
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-report
          path: benchmark-report.md

  build-assets:
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_suffix: linux-x86_64
            binary_name: harbour-rust-cli
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_suffix: windows-x86_64
            binary_name: harbour-rust-cli.exe
          - os: macos-14
            target: aarch64-apple-darwin
            asset_suffix: macos-aarch64
            binary_name: harbour-rust-cli
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release CLI
        run: cargo build --release -p harbour-rust-cli --target ${{ matrix.target }}

      - name: Package release asset
        shell: pwsh
        run: |
          $tag = if ("${{ github.event.inputs.tag }}" -ne "") {
            "${{ github.event.inputs.tag }}"
          } elseif ("${{ github.ref_type }}" -eq "tag") {
            "${{ github.ref_name }}"
          } else {
            "snapshot-${{ github.sha }}".Substring(0, 17)
          }

          $assetBase = "harbour-rust-cli-$tag-${{ matrix.asset_suffix }}"
          $distRoot = Join-Path $PWD "dist"
          $packageRoot = Join-Path $distRoot $assetBase
          $binaryPath = Join-Path $PWD "target/${{ matrix.target }}/release/${{ matrix.binary_name }}"

          New-Item -ItemType Directory -Force -Path $packageRoot | Out-Null
          Copy-Item $binaryPath -Destination (Join-Path $packageRoot "${{ matrix.binary_name }}")
          Copy-Item README.md -Destination (Join-Path $packageRoot "README.md")
          Copy-Item LICENSE -Destination (Join-Path $packageRoot "LICENSE")
          Copy-Item NOTICE -Destination (Join-Path $packageRoot "NOTICE")

          $zipPath = Join-Path $distRoot "$assetBase.zip"
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }

          Compress-Archive -Path (Join-Path $packageRoot "*") -DestinationPath $zipPath

      - name: Upload packaged asset
        uses: actions/upload-artifact@v4
        with:
          name: harbour-rust-cli-${{ matrix.asset_suffix }}
          path: dist/*.zip

  publish-release:
    needs:
      - preflight
      - build-assets
    if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.tag != ''
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Download packaged assets
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: harbour-rust-cli-*
          merge-multiple: true

      - name: Download benchmark report
        uses: actions/download-artifact@v4
        with:
          name: benchmark-report
          path: dist

      - name: Prepare release metadata
        shell: bash
        run: |
          if [[ -n "${{ github.event.inputs.tag }}" ]]; then
            release_tag="${{ github.event.inputs.tag }}"
          else
            release_tag="${{ github.ref_name }}"
          fi

          echo "RELEASE_TAG=$release_tag" >> "$GITHUB_ENV"

          notes_path="docs/releases/${release_tag}.md"
          if [[ -f "$notes_path" ]]; then
            cp "$notes_path" dist/RELEASE_NOTES.md
          else
            {
              echo "# Release ${release_tag}"
              echo
              echo "Automated release for ${release_tag}."
            } > dist/RELEASE_NOTES.md
          fi

          (
            cd dist
            sha256sum *.zip benchmark-report.md > SHA256SUMS.txt
          )

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          body_path: dist/RELEASE_NOTES.md
          prerelease: ${{ contains(env.RELEASE_TAG, 'alpha') || contains(env.RELEASE_TAG, 'beta') || contains(env.RELEASE_TAG, 'rc') }}
          files: |
            dist/*.zip
            dist/benchmark-report.md
            dist/SHA256SUMS.txt
